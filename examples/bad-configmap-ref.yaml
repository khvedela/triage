apiVersion: v1
kind: Pod
metadata:
  name: bad-configmap-demo
  namespace: default
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "echo $MY_KEY; sleep 3600"]
      env:
        - name: MY_KEY
          valueFrom:
            configMapKeyRef:
              name: does-not-exist
              key: some-key
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi
